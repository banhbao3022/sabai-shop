name: Deploy to GitHub Pages

# Builds a static export of the site and publishes it to GitHub Pages.
# For Vercel / Netlify / Cloudflare Pages you do NOT need this workflow — those
# platforms build the app directly from the repo (see README).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          NEXT_EXPORT: "true"
          NEXT_PUBLIC_SITE_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          # Project sites live under https://<user>.github.io/<repo>, so the
          # app must know its sub-path. For a user/custom-domain site, clear
          # this by setting NEXT_PUBLIC_BASE_PATH to an empty string.
          NEXT_PUBLIC_BASE_PATH: "/${{ github.event.repository.name }}"
        run: npm run build

      - name: Disable Jekyll (serve _next/*)
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
